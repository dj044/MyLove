<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>For My Queen Jasleen</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
      body {
        margin:0;
        font-family: Georgia, "Times New Roman", serif;
        background: linear-gradient(180deg,#fff6fb 0%,#fde8f3 45%,#f8d9ea 100%);
      }

      .royal-glow{
        box-shadow:0 25px 70px rgba(214,128,170,.35);
      }

      .gold-border{
        border:1px solid rgba(214,160,180,.5);
      }
    </style>
  </head>

  <body>
    <div id="root"></div>

    <script type="text/babel">
      function App(){

        const cards=[
          {
            icon:"🌸",
            title:"Beautiful Soul",
            text:"Your warmth and kindness create a peaceful energy wherever you go."
          },
          {
            icon:"👑",
            title:"Royal Grace",
            text:"You carry elegance so naturally — confident, charming and unforgettable."
          },
          {
            icon:"🐎",
            title:"Storybook Romance",
            text:"Like a Bridgerton dream — palace gardens, soft sunsets and a royal horse ride."
          }
        ];

        const reasons=[
          "You are awesome in the most natural way.",
          "Your positivity makes everything brighter.",
          "Your smile feels peaceful and magical.",
          "You are gorgeous inside and out."
        ];

        return(
          <div className="min-h-screen text-[#6a2c4f] relative overflow-hidden">

            <div className="absolute inset-0 pointer-events-none">
              <div className="absolute top-0 left-0 w-80 h-80 bg-pink-200/40 blur-3xl rounded-full"></div>
              <div className="absolute top-40 right-0 w-96 h-96 bg-rose-200/40 blur-3xl rounded-full"></div>
              <div className="absolute bottom-0 left-1/3 w-96 h-96 bg-pink-300/30 blur-3xl rounded-full"></div>
            </div>

            <main className="relative max-w-6xl mx-auto px-6 py-14">

              <section className="grid lg:grid-cols-2 gap-10 items-center">

                <div className="space-y-6">

                  <div className="inline-flex items-center gap-2 rounded-full px-4 py-2 bg-white/70 gold-border royal-glow">
                    🌷 <span className="text-sm tracking-widest uppercase" style={{fontFamily:'Arial'}}>Happy Women's Day</span>
                  </div>

                  <div>
                    <p className="uppercase text-sm tracking-[0.35em] text-pink-500" style={{fontFamily:'Arial'}}>For Jasleen</p>

                    <h1 className="text-5xl md:text-7xl leading-tight mt-3">
                      My <span className="italic text-pink-500">Royal</span> Queen
                    </h1>

                    <p className="text-lg mt-4 text-[#7a4b66]" style={{fontFamily:'Arial'}}>
                      A small royal corner built for the woman who brings beauty,
                      positivity and elegance into every moment of life.
                    </p>
                  </div>

                  <div className="flex gap-3 flex-wrap">

                    <a href="#tribute" className="px-5 py-3 rounded-2xl bg-pink-500 text-white royal-glow no-underline" style={{fontFamily:'Arial'}}>
                      Enter the Palace
                    </a>

                    <a href="#ride" className="px-5 py-3 rounded-2xl bg-white/70 gold-border no-underline text-[#6a2c4f]" style={{fontFamily:'Arial'}}>
                      Royal Ride
                    </a>

                  </div>

                </div>


                <div className="rounded-[2rem] p-4 gold-border bg-white/60 royal-glow">

                  <div className="rounded-[1.5rem] p-8 bg-gradient-to-br from-pink-200 via-rose-200 to-pink-300 min-h-[420px] flex flex-col justify-between">

                    <div>
                      <div className="flex justify-between uppercase text-xs tracking-widest" style={{fontFamily:'Arial'}}>
                        <span>Royal Note</span>
                        <span>2026</span>
                      </div>

                      <div className="text-center mt-10">
                        <div className="text-6xl">👑</div>
                        <h2 className="text-4xl mt-4">Lady Jasleen</h2>

                        <p className="mt-4 text-[#6a2c4f]" style={{fontFamily:'Arial'}}>
                          A beautiful woman with a glowing positive aura — someone who makes life feel joyful and bright.
                        </p>
                      </div>
                    </div>

                    <div className="bg-white/70 rounded-xl p-4 gold-border">
                      <p className="italic text-center" style={{fontFamily:'Arial'}}>
                        "May your life always feel like a royal garden ride — peaceful, beautiful and full of love."
                      </p>
                    </div>

                  </div>

                </div>

              </section>


              <section id="tribute" className="mt-24">

                <div className="text-center mb-10">
                  <p className="uppercase text-xs tracking-[0.35em] text-pink-500" style={{fontFamily:'Arial'}}>A Royal Tribute</p>
                  <h2 className="text-4xl md:text-5xl mt-3">Why You Are So Special</h2>
                </div>

                <div className="grid md:grid-cols-3 gap-6">

                  {cards.map(c=> (

                    <div key={c.title} className="p-6 rounded-3xl bg-white/70 gold-border royal-glow">
                      <div className="text-4xl mb-3">{c.icon}</div>
                      <h3 className="text-2xl">{c.title}</h3>
                      <p className="mt-2 text-[#7a4b66]" style={{fontFamily:'Arial'}}>{c.text}</p>
                    </div>

                  ))}

                </div>

              </section>


              <section id="ride" className="mt-24 grid lg:grid-cols-2 gap-8">

                <div className="p-8 rounded-3xl bg-gradient-to-br from-pink-100 to-rose-200 gold-border royal-glow">

                  <p className="uppercase text-xs tracking-[0.35em] text-pink-500" style={{fontFamily:'Arial'}}>Storybook Scene</p>

                  <h2 className="text-4xl md:text-5xl mt-3">The Royal Horse Ride</h2>

                  <p className="mt-4 text-[#7a4b66]" style={{fontFamily:'Arial'}}>
                    Imagine a golden sunset, palace gardens blooming with flowers, and the sound of gentle horse steps on a quiet path.
                    You riding through it like the queen of a timeless love story.
                  </p>

                </div>

                <div className="p-8 rounded-3xl bg-[#c94f88] text-white royal-glow relative">

                  <div className="absolute inset-0 opacity-10 flex items-center justify-center text-[10rem]">🐎</div>

                  <p className="uppercase text-xs tracking-[0.35em]" style={{fontFamily:'Arial'}}>For My Queen</p>

                  <h2 className="text-4xl mt-3">What Makes You Magical</h2>

                  <div className="mt-6 space-y-3">

                    {reasons.map(r=>(
                      <div key={r} className="bg-white/20 rounded-xl p-3" style={{fontFamily:'Arial'}}>
                        ✨ {r}
                      </div>
                    ))}

                  </div>

                </div>

              </section>


              <section className="mt-24 text-center">

                <div className="p-10 rounded-3xl bg-white/70 gold-border royal-glow">

                  <p className="uppercase text-xs tracking-[0.35em] text-pink-500" style={{fontFamily:'Arial'}}>Final Note</p>

                  <h2 className="text-4xl md:text-5xl mt-3">Happy Women's Day Jasleen ❤️</h2>

                  <p className="mt-4 text-[#7a4b66] max-w-2xl mx-auto" style={{fontFamily:'Arial'}}>
                    The world feels brighter because of your positivity, your beauty and your graceful spirit.
                  </p>

                  <div className="mt-6 text-lg font-semibold text-pink-600">
                    — Made with love by Daljeet 💐
                  </div>

                </div>

              </section>

            </main>

          </div>
        )
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />)

    </script>

  </body>
</html>
